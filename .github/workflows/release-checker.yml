# Automated check for upstream opencode releases.
# Runs every 12 hours.
# If a new release is found, bumps version.txt and opens a PR.
name: "opencode release checker"

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: anomalyco/opencode
  TARGET_BRANCH: main

jobs:
  check-bump:
    name: Check and bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream latest
        id: latest
        run: |
          VERSION=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Upstream: ${VERSION}"

      - name: Read current version
        id: current
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current: ${VERSION}"

      - name: Skip if up to date
        if: steps.latest.outputs.version == steps.current.outputs.version
        run: |
          echo "::notice::Version is up to date ($(cat version.txt | tr -d '[:space:]'))"
          exit 0

      - name: Bump and create PR
        if: steps.latest.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./scripts/bump-version.sh "$PR_VERSION" "${{ env.TARGET_BRANCH }}"
