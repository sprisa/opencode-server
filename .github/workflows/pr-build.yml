# Build the Docker image on pull requests and report its size,
# compared against the base branch (main).
name: PR build

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build and report size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (baseline)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref || github.ref_name }}
          path: baseline

      - name: Read version (baseline)
        id: version-base
        run: |
          VERSION=$(cat baseline/version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build baseline image
        uses: docker/build-push-action@v6
        with:
          context: baseline
          load: true
          build-args: OPENCODE_VERSION=${{ steps.version-base.outputs.version }}
          tags: sprisa/opencode:baseline

      - name: Record baseline size
        id: baseline-size
        run: |
          echo "human=$(docker images sprisa/opencode:baseline --format '{{.Size}}')" >> "$GITHUB_OUTPUT"
          echo "bytes=$(docker image inspect sprisa/opencode:baseline --format '{{.Size}}')" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          path: head
          ref: ${{ github.head_ref || '' }}

      - name: Determine PR context
        id: pr-context
        run: |
          if [ -n "${{ github.head_ref }}" ]; then
            echo "dir=head" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Read version (PR)
        id: version-pr
        run: |
          VERSION=$(cat ${{ steps.pr-context.outputs.dir }}/version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build PR image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.pr-context.outputs.dir }}
          load: true
          build-args: OPENCODE_VERSION=${{ steps.version-pr.outputs.version }}
          tags: sprisa/opencode:pr-${{ github.event.number || 'manual' }}

      - name: Record PR size
        id: pr-size
        run: |
          echo "human=$(docker images sprisa/opencode:pr-${{ github.event.number || 'manual' }} --format '{{.Size}}')" >> "$GITHUB_OUTPUT"
          echo "bytes=$(docker image inspect sprisa/opencode:pr-${{ github.event.number || 'manual' }} --format '{{.Size}}')" >> "$GITHUB_OUTPUT"

      - name: Compare and report image sizes
        id: compare
        run: |
          PR_NUM="${{ github.event.number }}"
          BASELINE_HUMAN="${{ steps.baseline-size.outputs.human }}"
          BASELINE_BYTES=${{ steps.baseline-size.outputs.bytes }}
          PR_HUMAN="${{ steps.pr-size.outputs.human }}"
          PR_BYTES=${{ steps.pr-size.outputs.bytes }}
          DIFF_BYTES=$(( PR_BYTES - BASELINE_BYTES ))

          if [ "$DIFF_BYTES" -ge 0 ]; then
            SIGN="+"
            COLOR="red"
          else
            SIGN=""
            COLOR="green"
          fi

          {
            echo "## Docker image size comparison"
            echo ""
            echo "| Image | Size |"
            echo "|---|---|"
            echo "| Baseline (main) | $BASELINE_HUMAN |"
            echo "| This PR | $PR_HUMAN |"
            echo "| **Difference** | **${SIGN}${DIFF_BYTES} bytes** |"
            echo ""
            echo "### Baseline layers"
            echo ""
            echo "| Layer | Size |"
            echo "|---|---|"
            docker history sprisa/opencode:baseline \
              --format "| {{.CreatedSince}} | {{.Size}} |" \
              --no-trunc | tail -n +2
            echo ""
            echo "### PR layers"
            echo ""
            echo "| Layer | Size |"
            echo "|---|---|"
            docker history "sprisa/opencode:pr-${PR_NUM}" \
              --format "| {{.CreatedSince}} | {{.Size}} |" \
              --no-trunc | tail -n +2
          } >> "$GITHUB_STEP_SUMMARY"

          echo "baseline: $BASELINE_HUMAN ($BASELINE_BYTES bytes)"
          echo "pr: $PR_HUMAN ($PR_BYTES bytes)"
          echo "diff: ${SIGN}${DIFF_BYTES} bytes"

          echo "diff-bytes=${SIGN}${DIFF_BYTES}" >> "$GITHUB_OUTPUT"
          echo "pr-human=${PR_HUMAN}" >> "$GITHUB_OUTPUT"
          echo "baseline-human=${BASELINE_HUMAN}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.number }}"
          BASELINE="${{ steps.baseline-size.outputs.human }}"
          CURRENT="${{ steps.pr-size.outputs.human }}"
          DIFF="${{ steps.compare.outputs.diff-bytes }}"

          BODY=$(cat <<EOF
          ## Docker image size comparison

          | Image | Size |
          |---|---|
          | Baseline (main) | $BASELINE |
          | This PR | $CURRENT |
          | **Difference** | **${DIFF} bytes** |
          EOF
          )

          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY" --silent
          else
            gh pr comment "$PR_NUM" --body "$BODY"
          fi
